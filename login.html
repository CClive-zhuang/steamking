<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 白云帖子</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{
background:#0c0d13;
background-image:
radial-gradient(circle at 25% 20%, rgba(30,60,180,0.07), transparent 45%),
radial-gradient(circle at 75% 80%, rgba(40,130,250,0.07), transparent 45%);
color:#e5e5e5;
padding-bottom:130px;
}
.nav{
background:rgba(17,18,24,0.95);
border-bottom:1px solid #2a2b36;
}
.nav-inner{max-width:800px;margin:0 auto;padding:16px 20px}
.logo{font-size:20px;font-weight:700;color:#007bff}
.container{max-width:400px;margin:50px auto;padding:0 20px}
.card{
background:rgba(22,23,31,0.85);
border:1px solid #2a2b36;
border-radius:12px;padding:30px;
}
.title{text-align:center;margin-bottom:24px}
input{
width:100%;padding:14px;background:#14151d;border:1px solid #2a2b36;
border-radius:8px;color:#e5e5e5;margin-bottom:12px;outline:none;
}
button{
width:100%;padding:14px;background:#007bff;color:#fff;border:none;
border-radius:8px;font-weight:600;cursor:pointer;
}
.footer{
position:fixed;bottom:0;width:100%;
background:rgba(17,18,24,0.98);
border-top:1px solid #2a2b36;
padding:16px;text-align:center;font-size:12px;color:#888;
}
</style>
</head>
<body>

<div class="nav">
<div class="nav-inner">
<div class="logo">白云帖子</div>
</div>
</div>

<div class="container">
<div class="card">
<h2 class="title">登录</h2>
<input id="user" placeholder="用户名">
<input id="pwd" type="password" placeholder="密码">
<button onclick="login()">登录</button>
</div>
</div>

<div class="footer">
© 2026 白云团队 保留所有权利
</div>

<script>
window.onload = function () {
  const last = getCookie("last_user");
  if (last) document.getElementById("user").value = last;
};

function getCookie(name) {
  const arr = document.cookie.match(new RegExp(name + "=([^;]+)"));
  return arr ? decodeURIComponent(arr[1]) : "";
}

function setCookie(name, val, days) {
  const exp = new Date(Date.now() + days * 86400000).toUTCString();
  document.cookie = name + "=" + encodeURIComponent(val) + ";expires=" + exp + ";path=/;SameSite=Strict";
}

function login() {
  const user = document.getElementById("user").value.trim();
  const pwd = document.getElementById("pwd").value.trim();

  if (!user) return alert("错误：请输入用户名");
  if (!pwd) return alert("错误：请输入密码");

  const realPwd = localStorage.getItem("user_" + user);
  if (!realPwd) return alert("错误：账号不存在");

  if (atob(realPwd) !== pwd) return alert("错误：密码不正确");

  setCookie("login_user", user, 7);
  setCookie("last_user", user, 30);
  alert("登录成功");
  location.href = "index.html";
}
</script>

</body>
</html>
