<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - 白云帖子</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{
background:#0c0d13;
background-image:
radial-gradient(circle at 25% 20%, rgba(30,60,180,0.07), transparent 45%),
radial-gradient(circle at 75% 80%, rgba(40,130,250,0.07), transparent 45%);
color:#e5e5e5;
padding-bottom:130px;
}
.nav{
background:rgba(17,18,24,0.95);
border-bottom:1px solid #2a2b36;
}
.nav-inner{max-width:800px;margin:0 auto;padding:16px 20px}
.logo{font-size:20px;font-weight:700;color:#007bff}
.container{max-width:400px;margin:50px auto;padding:0 20px}
.card{
background:rgba(22,23,31,0.85);
border:1px solid #2a2b36;
border-radius:12px;padding:30px;
}
.title{text-align:center;margin-bottom:24px}
input{
width:100%;padding:14px;background:#14151d;border:1px solid #2a2b36;
border-radius:8px;color:#e5e5e5;margin-bottom:12px;outline:none;
}
button{
width:100%;padding:14px;background:#007bff;color:#fff;border:none;
border-radius:8px;font-weight:600;cursor:pointer;
}
.footer{
position:fixed;left:0;bottom:0;width:100%;
background:rgba(17,18,24,0.98);
border-top:1px solid #2a2b36;
padding:16px;text-align:center;font-size:12px;color:#888;
}
</style>
</head>
<body>

<div class="nav">
<div class="nav-inner">
<div class="logo">白云帖子</div>
</div>
</div>

<div class="container">
<div class="card">
<h2 class="title">注册账号</h2>
<input id="user" placeholder="用户名">
<input id="pwd" type="password" placeholder="密码（必须字母+数字）">
<input id="pwd2" type="password" placeholder="确认密码">
<button onclick="register()">注册</button>
</div>
</div>

<div class="footer">
© 2026 白云团队 保留所有权利
</div>

<script>
function register() {
  const user = document.getElementById("user").value.trim();
  const pwd = document.getElementById("pwd").value.trim();
  const pwd2 = document.getElementById("pwd2").value.trim();

  if (!user) return alert("错误：用户名不能为空");
  if (user.length < 4 || user.length > 20) return alert("错误：用户名长度必须在4-20位之间");
  if (/^[0-9]+$/.test(user)) return alert("错误：用户名不能是纯数字");

  if (!pwd) return alert("错误：密码不能为空");
  if (pwd.length < 8) return alert("错误：密码至少8位");
  if (!/[A-Za-z]/.test(pwd) || !/[0-9]/.test(pwd)) return alert("错误：密码必须同时包含字母和数字");
  if (pwd === "11111111" || pwd === "12345678" || pwd === "00000000") return alert("错误：密码过于简单，禁止注册");

  if (pwd !== pwd2) return alert("错误：两次密码输入不一致");
  if (localStorage.getItem("user_" + user)) return alert("错误：用户名已被注册");

  localStorage.setItem("user_" + user, btoa(pwd));
  alert("注册成功！请登录");
  location.href = "login.html";
}
</script>

</body>
</html>
