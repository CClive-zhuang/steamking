<script>
const MAX_ONLINE = 80;
const MAX_STAY = 5 * 60 * 1000;
const BLOCK_WAIT = 1 * 60 * 1000;

function getVid(){let v=localStorage.getItem("vid");if(!v){v="vid_"+Math.random().toString(36);localStorage.setItem("vid",v);}return v;}
function getOnline(){let o=JSON.parse(localStorage.getItem("online")||"{}");let t=Date.now();for(let k in o){if(t-o[k]>MAX_STAY)delete o[k];}localStorage.setItem("online",JSON.stringify(o));return o;}

function check(){
let t=Date.now();
let b=parseInt(localStorage.getItem("block")||"0");
if(t-b<BLOCK_WAIT){document.body.innerHTML="<div style='position:fixed;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-direction:column;gap:12px;'><h3>🛑 当前访问人数过多</h3><p>请1分钟后再试</p></div>";throw new Error("block");}
let o=getOnline();if(Object.keys(o).length>=MAX_ONLINE){localStorage.setItem("block",t);document.body.innerHTML="<div style='position:fixed;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-direction:column;gap:12px;'><h3>🛑 当前访问人数过多</h3><p>请1分钟后再试</p></div>";throw new Error("block");}
let e=parseInt(localStorage.getItem("enter")||"0");if(e&&t-e>MAX_STAY){document.body.innerHTML="<div style='position:fixed;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-direction:column;gap:12px;'><h3>⏱️ 你停留太久了</h3><p>外面的人还在排队呢！</p></div>";throw new Error("kick");}
if(!e)localStorage.setItem("enter",t);
o[getVid()]=t;localStorage.setItem("online",JSON.stringify(o));
}

check();
</script>
