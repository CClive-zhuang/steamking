<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帖子详情 - 白云帖子</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{
background:#0c0d13;
background-image:
radial-gradient(circle at 25% 20%, rgba(30,60,180,0.07), transparent 45%),
radial-gradient(circle at 75% 80%, rgba(40,130,250,0.07), transparent 45%);
color:#e5e5e5;
padding-bottom:130px;
}
.nav{
background:rgba(17,18,24,0.95);
border-bottom:1px solid #2a2b36;
}
.nav-inner{max-width:900px;margin:0 auto;padding:16px 20px}
.logo{font-size:20px;font-weight:700;color:#007bff}
.container{max-width:800px;margin:30px auto;padding:0 20px}
.card{
background:rgba(22,23,31,0.85);
border:1px solid #2a2b36;
border-radius:12px;padding:24px;
}
.title{font-size:22px;margin-bottom:16px}
.content{font-size:16px;line-height:1.8}
.footer{
position:fixed;bottom:0;width:100%;
background:rgba(17,18,24,0.98);
border-top:1px solid #2a2b36;
padding:16px;text-align:center;font-size:12px;color:#888;
}
</style>
</head>
<body>

<div class="nav">
<div class="nav-inner">
<div class="logo">白云帖子</div>
<a href="index.html" style="color:#fff;text-decoration:none">返回</a>
</div>
</div>

<div class="container">
<div class="card">
<h1 class="title" id="title"></h1>
<div class="content" id="content"></div>
</div>
</div>

<div class="footer">
© 2026 白云团队 保留所有权利
</div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");
const posts = JSON.parse(localStorage.getItem("posts")) || [];
const post = posts[id];

if (post) {
  document.getElementById("title").textContent = post.title;
  document.getElementById("content").textContent = post.content;
} else {
  alert("帖子不存在");
  location.href = "index1.html";
}
</script>

</body>
</html>
