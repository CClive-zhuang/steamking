<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamKing 导航</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Microsoft YaHei', sans-serif;
}

html, body {
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #000 0%, #1a1a2e 30%, #16213e 70%, #0f0f23 100%);
  background-attachment: fixed;
  color: #fff;
  text-align: center;
  padding: 20px;
}

/* 大标题 */
.title {
  font-size: 42px;
  font-weight: bold;
  margin-bottom: 60px;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(100, 150, 255, 0.4);
}

/* 按钮容器 */
.btn-box {
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
  max-width: 380px;
}

/* 磨砂玻璃按钮 */
.glass-btn {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 16px;
  padding: 22px 20px;
  font-size: 18px;
  font-weight: 500;
  color: #fff;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.glass-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(80, 120, 255, 0.2);
}
</style>
</head>

<body>

<h1 class="title">SteamKing导航</h1>

<div class="btn-box">
  <a href="https://cclive-zhuang.github.io/steamking/index-free.html" class="glass-btn" target="_blank">免费官网</a>
  <a href="https://cclive-zhuang.github.io/steamking/index-PRO.html" class="glass-btn" target="_blank">付费官网</a>
</div>

</body>
</html>
