<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布帖子 - 白云帖子</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{
background:#0c0d13;
background-image:
radial-gradient(circle at 25% 20%, rgba(30,60,180,0.07), transparent 45%),
radial-gradient(circle at 75% 80%, rgba(40,130,250,0.07), transparent 45%);
color:#e5e5e5;
padding-bottom:130px;
}
.nav{
background:rgba(17,18,24,0.95);
border-bottom:1px solid #2a2b36;
}
.nav-inner{max-width:800px;margin:0 auto;padding:16px 20px}
.logo{font-size:20px;font-weight:700;color:#007bff}
.container{max-width:700px;margin:40px auto;padding:0 20px}
.card{
background:rgba(22,23,31,0.85);
border:1px solid #2a2b36;
border-radius:12px;padding:30px;
}
input,textarea{
width:100%;padding:14px;background:#14151d;border:1px solid #2a2b36;
border-radius:8px;color:#e5e5e5;margin-bottom:12px;outline:none;
}
button{
width:100%;padding:14px;background:#007bff;color:#fff;border:none;
border-radius:8px;font-weight:600;cursor:pointer;
}
.footer{
position:fixed;bottom:0;width:100%;
background:rgba(17,18,24,0.98);
border-top:1px solid #2a2b36;
padding:16px;text-align:center;font-size:12px;color:#888;
}
</style>
</head>
<body>

<div class="nav">
<div class="nav-inner">
<div class="logo">白云帖子</div>
</div>
</div>

<div class="container">
<div class="card">
<h2 style="margin-bottom:16px;text-align:center">发布新帖子</h2>
<input id="title" placeholder="请输入标题">
<textarea id="content" rows="8" placeholder="请输入内容"></textarea>
<button onclick="publish()">发布</button>
</div>
</div>

<div class="footer">
© 2026 白云团队 保留所有权利
</div>

<script>
function publish() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();

  if (!title) return alert("错误：请填写标题");
  if (!content) return alert("错误：请填写内容");

  const posts = JSON.parse(localStorage.getItem("posts")) || [];
  posts.unshift({ title, content, time: new Date().toLocaleString() });
  localStorage.setItem("posts", JSON.stringify(posts));

  alert("发布成功！");
  location.href = "index1.html";
}
</script>

</body>
</html>
