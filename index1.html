<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白云帖子 - 专业社区</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{
background:#0c0d13;
background-image:
radial-gradient(circle at 25% 20%, rgba(30,60,180,0.07), transparent 45%),
radial-gradient(circle at 75% 80%, rgba(40,130,250,0.07), transparent 45%);
color:#e5e5e5;
padding-bottom:130px;
}
.nav{
position:sticky;top:0;z-index:999;
background:rgba(17,18,24,0.95);
backdrop-filter:blur(12px);
border-bottom:1px solid #2a2b36;
}
.nav-inner{
max-width:900px;margin:0 auto;padding:16px 20px;
display:flex;justify-content:space-between;align-items:center;
}
.logo{font-size:20px;font-weight:700;color:#007bff}
.btns{display:flex;gap:12px}
.btn{
background:#007bff;color:#fff;border:none;border-radius:8px;padding:10px 16px;
font-weight:600;cursor:pointer;text-decoration:none;font-size:14px;
}
.container{max-width:900px;margin:30px auto;padding:0 20px}
.card{
background:rgba(22,23,31,0.85);
border:1px solid #2a2b36;
border-radius:12px;padding:24px;margin-bottom:20px;
}
.title{font-size:18px;margin-bottom:16px}
.post-item{
padding:14px 0;border-bottom:1px solid #2a2b36;
}
.post-item:last-child{border-bottom:none}
.post-item a{
color:#e5e5e5;text-decoration:none;font-size:16px;font-weight:500;
}
.footer{
position:fixed;left:0;bottom:0;width:100%;
background:rgba(17,18,24,0.98);
border-top:1px solid #2a2b36;
padding:16px 20px;
text-align:center;
font-size:12px;color:#888;
line-height:1.6;
}
.footer a{
color:#888;text-decoration:none;margin:0 10px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="nav">
<div class="nav-inner">
<div class="logo">白云帖子</div>
<div class="btns">
<a href="login.html" class="btn">登录</a>
<a href="register.html" class="btn" style="background:#222">注册</a>
<a href="publish.html" class="btn">发布</a>
</div>
</div>
</div>

<div class="container">
<div class="card">
<h3 class="title">最新帖子</h3>
<div id="post-list"></div>
</div>
</div>

<div class="footer">
<a onclick="showPrivacy()">隐私政策</a>
<a onclick="showAgreement()">用户协议</a>
<a onclick="showCookie()">Cookie 说明</a>
<br>
© 2026 白云团队 保留所有权利
</div>

<script>
const posts = JSON.parse(localStorage.getItem("posts")) || [];
const list = document.getElementById("post-list");

if (posts.length === 0) {
  list.innerHTML = `<div style="padding:20px;text-align:center;color:#888">暂无帖子</div>`;
} else {
  posts.forEach((p, i) => {
    const item = document.createElement("div");
    item.className = "post-item";
    item.innerHTML = `<a href="post.html?id=${i}">${p.title}</a>`;
    list.appendChild(item);
  });
}

  alert(`【隐私政策】

}

  alert(`【用户协议】
欢迎使用白云帖子平台，在注册使用前，请您仔细阅读本用户协议。用户应当遵守国家法律法规，文明发言，不得发布违法、违规、侵权、暴力、色情、虚假、广告等不良内容。用户不得恶意注册账号、暴力破解密码、刷屏灌水、干扰平台正常运行。用户应对自己发布的内容独立承担全部法律责任，平台仅提供信息发布与存储服务。对于违规用户，我们有权采取删帖、禁言、封号等处理措施。本平台保留随时修改协议条款的权利，用户继续使用即视为同意最新协议内容。`);

function showCookie() {
  alert(`【Cookie 说明】
为了实现账号登录、记住用户名密码、提升使用体验，本平台使用 Cookie 技术。Cookie 是安全的文本数据，仅用于存储登录状态、偏好设置等必要信息，不会用于窃取或收集您的隐私信息。您可以通过浏览器设置管理 Cookie，但关闭 Cookie 可能导致无法登录、无法记住账号等功能异常。我们不会使用 Cookie 追踪您的其他网站行为，也不会将 Cookie 数据用于非法用途。您继续使用白云帖子，即表示您同意我们按照本说明使用 Cookie。`);
}
</script>

</body>
</html>
